<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda · Vida Sana Almacén Natural</title>
<meta name="description" content="Comprá online frutos secos, semillas, legumbres, cereales, infusiones y más. Filtrá por estilo de vida: Sin TACC, Vegano, Sin azúcar, Orgánico, Apto diabéticos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" href="assets/img/logo.png">
</head>
<body>
<div id="header-slot"></div>

<section class="page-hero">
  <div class="contenedor">
    <div class="breadcrumb"><a href="index.html">Inicio</a> &nbsp;/&nbsp; Tienda</div>
    <h1 id="tituloTienda">Nuestra tienda</h1>
    <p style="color:var(--crema-osc);max-width:560px;margin:8px auto 0">Productos naturales seleccionados. Elegí por categoría o según tu estilo de vida.</p>
  </div>
</section>

<section class="seccion">
  <div class="contenedor">
    <div class="tienda-layout">
      <!-- FILTROS -->
      <aside class="filtros">
        <div class="filtro-bloque">
          <h4>Categorías</h4>
          <div id="filtroCats"></div>
        </div>
        <div class="filtro-bloque">
          <h4>Estilo de vida</h4>
          <div id="filtroEstilos"></div>
        </div>
        <div class="filtro-bloque">
          <h4>Precio</h4>
          <div class="filtro-item"><input type="radio" name="precio" value="all" checked onchange="setPrecio('all')"><span>Todos</span></div>
          <div class="filtro-item"><input type="radio" name="precio" value="0-3000" onchange="setPrecio('0-3000')"><span>Hasta $3.000</span></div>
          <div class="filtro-item"><input type="radio" name="precio" value="3000-7000" onchange="setPrecio('3000-7000')"><span>$3.000 – $7.000</span></div>
          <div class="filtro-item"><input type="radio" name="precio" value="7000-99999999" onchange="setPrecio('7000-99999999')"><span>Más de $7.000</span></div>
        </div>
      </aside>

      <!-- GRILLA -->
      <div>
        <div class="tienda-toolbar">
          <span class="conteo-result" id="conteoResult"></span>
          <select id="ordenar" onchange="render()">
            <option value="destacados">Ordenar: Destacados</option>
            <option value="precio-asc">Precio: menor a mayor</option>
            <option value="precio-desc">Precio: mayor a menor</option>
            <option value="nombre">Nombre: A-Z</option>
          </select>
        </div>
        <div class="chips-activos" id="chipsActivos"></div>
        <div class="tienda-grid" id="grilla"></div>
      </div>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="assets/js/site.js"></script>
<script>
  initChrome('tienda');
  let fCats = new Set(), fEstilos = new Set(), fPrecio = 'all';

  // Pre-filtro por URL (?cat=)
  const params = new URLSearchParams(location.search);
  if(params.get('cat')) fCats.add(params.get('cat'));

  // Construir filtros
  qs('#filtroCats').innerHTML = CATS.map(c=>{
    const n = PRODUCTS.filter(p=>p.cat===c.slug).length;
    return `<label class="filtro-item"><input type="checkbox" value="${c.slug}" ${fCats.has(c.slug)?'checked':''} onchange="toggleCat('${c.slug}',this.checked)"><span>${c.nom}</span><span class="conteo">${n}</span></label>`;
  }).join('');
  qs('#filtroEstilos').innerHTML = ESTILOS.map(e=>{
    const n = PRODUCTS.filter(p=>p.attrs.includes(e)).length;
    return `<label class="filtro-item"><input type="checkbox" value="${e}" onchange="toggleEstilo('${e}',this.checked)"><span>${e}</span><span class="conteo">${n}</span></label>`;
  }).join('');

  function toggleCat(s,on){ on?fCats.add(s):fCats.delete(s); render(); }
  function toggleEstilo(e,on){ on?fEstilos.add(e):fEstilos.delete(e); render(); }
  function setPrecio(v){ fPrecio=v; render(); }
  window.toggleCat=toggleCat; window.toggleEstilo=toggleEstilo; window.setPrecio=setPrecio;

  function quitarChip(tipo,val){
    if(tipo==='cat'){ fCats.delete(val); const cb=qs(`#filtroCats input[value="${val}"]`); if(cb) cb.checked=false; }
    if(tipo==='est'){ fEstilos.delete(val); const cb=qs(`#filtroEstilos input[value="${val}"]`); if(cb) cb.checked=false; }
    render();
  }
  window.quitarChip=quitarChip;

  function render(){
    let arr = PRODUCTS.filter(p=>{
      if(fCats.size && !fCats.has(p.cat)) return false;
      if(fEstilos.size && ![...fEstilos].every(e=>p.attrs.includes(e))) return false;
      if(fPrecio!=='all'){ const [a,b]=fPrecio.split('-').map(Number); if(p.precio<a||p.precio>b) return false; }
      return true;
    });
    const ord = qs('#ordenar').value;
    if(ord==='precio-asc') arr.sort((a,b)=>a.precio-b.precio);
    if(ord==='precio-desc') arr.sort((a,b)=>b.precio-a.precio);
    if(ord==='nombre') arr.sort((a,b)=>a.nom.localeCompare(b.nom));

    qs('#conteoResult').textContent = `${arr.length} producto${arr.length!==1?'s':''}`;

    // Título dinámico si hay 1 categoría
    if(fCats.size===1){ const c=CATS.find(x=>x.slug===[...fCats][0]); if(c) qs('#tituloTienda').textContent=c.nom; }
    else qs('#tituloTienda').textContent='Nuestra tienda';

    // Chips activos
    const chips=[...[...fCats].map(c=>['cat',c,catNom(c)]), ...[...fEstilos].map(e=>['est',e,e])];
    qs('#chipsActivos').innerHTML = chips.map(([t,v,l])=>`<span class="chip-activo">${l}<button onclick="quitarChip('${t}','${v}')">&times;</button></span>`).join('');

    qs('#grilla').innerHTML = arr.length
      ? arr.map(cardProducto).join('')
      : `<div class="sin-resultados"><h3>No encontramos productos</h3><p>Probá quitando algún filtro.</p></div>`;
  }
  window.render=render;
  render();
</script>
</body>
</html>
