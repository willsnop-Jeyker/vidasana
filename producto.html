<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto · Vida Sana Almacén Natural</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" href="assets/img/logo.png">
</head>
<body>
<div id="header-slot"></div>

<section class="seccion" style="padding-top:48px">
  <div class="contenedor">
    <div class="breadcrumb" id="breadcrumb" style="font-family:var(--sans);font-size:.82rem;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;margin-bottom:30px"></div>
    <div class="producto-layout" id="productoLayout"></div>

    <div class="producto-tabs" id="productoTabs"></div>

    <div style="margin-top:80px">
      <div class="seccion-head-flex"><div><span class="kicker" style="font-family:var(--sans);text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:600;color:var(--naranja);display:block;margin-bottom:10px">También te puede gustar</span><h2>Productos relacionados</h2></div></div>
      <div class="prod-grid" id="relacionados"></div>
    </div>
  </div>
</section>

<div id="footer-slot"></div>
<script src="assets/js/site.js"></script>
<script>
  initChrome('tienda');
  const id = new URLSearchParams(location.search).get('id') || 'p01';
  const p = getProd(id) || PRODUCTS[0];
  let qty = 1;

  const precio = p.old
    ? `<span class="tachado">${money(p.old)}</span>${money(p.precio)}`
    : money(p.precio);
  const estrellas = '★★★★★';

  qs('#breadcrumb').innerHTML = `<a href="index.html">Inicio</a> / <a href="tienda.html">Tienda</a> / <a href="tienda.html?cat=${p.cat}">${catNom(p.cat)}</a> / ${p.nom}`;

  qs('#productoLayout').innerHTML = `
    <div class="producto-galeria">
      <div class="principal"><img src="${p.img}" alt="${p.nom}" id="imgPrincipal"></div>
    </div>
    <div class="producto-info">
      <div class="p-cat">${catNom(p.cat)}</div>
      <h1>${p.nom}</h1>
      <div class="p-stars">${estrellas}<span>(24 reseñas)</span></div>
      <div class="producto-precio">${precio}</div>
      <div class="producto-xunidad">${p.peso} · ${precioPorUnidad(p)} &nbsp;·&nbsp; <span style="color:var(--oliva)">✔ En stock</span></div>
      <p class="producto-desc">${p.desc || descProd(p)}</p>
      <div class="producto-attrs">${p.attrs.map(a=>`<span class="attr-chip">✔ ${a}</span>`).join('')}</div>
      <div class="compra-fila">
        <div class="qty-selector">
          <button onclick="cambiarQty(-1)">−</button><span id="qtyVal">1</span><button onclick="cambiarQty(1)">+</button>
        </div>
        <button class="btn btn-primario" onclick="addToCart('${p.id}', qty)">${IC.carrito} Agregar al carrito</button>
      </div>
      <a href="https://wa.me/${WA_NUM}?text=${encodeURIComponent('Hola! Quería consultar por: '+p.nom)}" target="_blank" class="btn btn-secundario btn-bloque" style="margin-bottom:24px">Consultar por WhatsApp</a>
      <div class="producto-meta">
        <div><strong>Presentación:</strong> ${p.peso} · También disponible suelto por kg en el local</div>
        <div><strong>Categoría:</strong> <a href="tienda.html?cat=${p.cat}" style="color:var(--naranja)">${catNom(p.cat)}</a></div>
        <div><strong>Etiquetas:</strong> ${p.attrs.join(', ')}</div>
      </div>
    </div>`;

  qs('#productoTabs').innerHTML = `
    <div class="tabs-nav">
      <button class="activo" onclick="tab(0)">Descripción</button>
      <button onclick="tab(1)">Información adicional</button>
      <button onclick="tab(2)">Envíos y retiro</button>
    </div>
    <div class="tab-panel activo">
      <p>${p.desc ? p.desc + ' ' + descProd(p) : descProd(p)}</p>
      <p>En Vida Sana seleccionamos cada producto recorriendo productores y mayoristas para asegurar calidad, frescura y un precio accesible. Si tenés dudas sobre cómo incorporarlo a tu alimentación, escribinos: te asesoramos personalmente.</p>
      <h4>Conservación</h4>
      <p>Conservar en lugar fresco y seco, en envase hermético, lejos de la luz solar directa.</p>
    </div>
    <div class="tab-panel">
      <ul>
        <li><strong>Peso:</strong> ${p.peso}</li>
        <li><strong>Estilo de vida:</strong> ${p.attrs.join(' · ')}</li>
        <li><strong>Origen:</strong> Selección nacional</li>
        <li><strong>Venta:</strong> Envasado o suelto por kg en el local</li>
      </ul>
    </div>
    <div class="tab-panel">
      <h4>Retiro en local</h4>
      <p>San Antonio Norte 161, Gualeguay. Sin costo.</p>
      <h4>Envíos</h4>
      <ul>
        <li>Gualeguay: <strong>gratis</strong> en compras superiores a $20.000 (si no, $1.500).</li>
        <li>Entre Ríos: $3.500.</li>
        <li>Resto del país: $6.000.</li>
      </ul>
    </div>`;

  qs('#relacionados').innerHTML = PRODUCTS.filter(x=>x.cat===p.cat && x.id!==p.id).slice(0,4).map(cardProducto).join('')
    || PRODUCTS.filter(x=>x.id!==p.id).slice(0,4).map(cardProducto).join('');

  function cambiarQty(d){ qty=Math.max(1,qty+d); qs('#qtyVal').textContent=qty; }
  function tab(i){ qsa('.tabs-nav button').forEach((b,k)=>b.classList.toggle('activo',k===i)); qsa('.tab-panel').forEach((pn,k)=>pn.classList.toggle('activo',k===i)); }
  window.cambiarQty=cambiarQty; window.tab=tab; window.qty=qty;
  // mantener qty global sincronizada
  Object.defineProperty(window,'qty',{get:()=>qty,set:v=>qty=v});
</script>
</body>
</html>
